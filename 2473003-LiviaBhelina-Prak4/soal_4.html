<!DOCTYPE html>
<html>
    <head>
        <title>halaman web rounded-box</title>
    <body>
    <style>
        body{
        background:#901315;}

        .box{
            width:250px;
            margin:50px;
            background-color:#731010;}

        .box-t{background:url(img/box_t.gif)top repeat-x;}
        .box-b{background:url(img/box_b.gif)bottom repeat-x;}
        .box-l{background:url(img/box_l.gif)left repeat-y;}
        .box-r{background:url(img/box_r.gif)right repeat-y;}

        .box-tl{background:url(img/box_tl.gif)top left no-repeat;}
        .box-tr{background:url(img/box_tr.gif)top right no-repeat;}
        .box-bl{background:url(img/box_bl.gif)bottom left no-repeat;}
        .box-br{background:url(img/box_br.gif)bottom right no-repeat;}

        .content{
            padding:20px;
            color:white;}
        a{
            color:yellow;
            text-decoration:none;}

        a:hover{
            color:green;
            text-decoration:underline;}

    </style>
    </head>
    <body>
        <div class="box">
        <div class="box-t">
        <div class="box-b">
        <div class="box-l">
        <div class="box-r">
        <div class="box-tl">
        <div class="box-tr">
        <div class="box-bl">
        <div class="box-br">
        <div class="content">

        <h2>12.02.2011</h2>
        <p>Satu per satu para pesaing Manchester United mulai
        menunjukkan tanda-tanda "menyerah". Kini tinggal..</p>

        <a href="#" style="display:block;text-align:right;">more</a>
        </div>
        </div>
        </div>
        </div>
        </div>
        </div>
        </div>
        </div>
        </div>
    </body>
</html>
