<!DOCTYPE html>
<html>
    <head>
        <title>halaman web teknik styling table</title>
    </head>
        <style>
            table{
                border-collapse: collapse;
                border: 1px solid #98bf21;
                width: 400px;}
            th, td{
                border: 1px solid #98bf21;
                padding: 4px;}
            th{
                background:#98bf21;
                color:white;
                text-align:left;}

            .kuning{
                background:#f5f5c6;}
            .hijau{
                background:#eaf2d3;}
            .footer{
                background:#98bf21;
                color:white;
                text-align:center;}
        </style>
    </head>
    <body>
    <table>
    <tr><th>Company</th>
    <th>Contact</th>
    <th>Country</th></tr>

    <tr><td class="kuning">Alfreds Futterkiste</td>
    <td class="hijau">Maria Anders</td>
    <td class="kuning">Germany</td></tr>

    <tr><td class="hijau">Berglunds snabbköp</td>
    <td class="kuning">Christina Berglund</td>
    <td class="hijau">Sweden</td></tr>

    <tr><td class="kuning">Centro comercial Moctezuma</td>
    <td class="hijau">Francisco Chang</td>
    <td class="kuning">Mexico</td></tr>

    <tr><td class="hijau">Ernst Handel</td>
    <td class="kuning">Roland Mendel</td>
    <td class="hijau">Austria</td></tr>

    <tr><td class="kuning">Island Trading</td>
    <td class="hijau">Helen Bennett</td>
    <td class="kuning">UK</td></tr>

    <tr><td colspan="3" class="footer">© www.w3schools.org</td></tr>

    </table>
    </body>
</html>
