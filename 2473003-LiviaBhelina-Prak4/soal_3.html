<!DOCTYPE html>
<html>
    <head>
        <title>halaman web teknik styling background top left dan bottom right</title>
    </head>
        <style>
            .box{
                width:200px;
                height:100px;
                background-color:#731010;

                background-image: url("img/top_left.gif"), url("img/bottom_right.gif");
                background-position: top left, bottom right;
                background-repeat: no-repeat, no-repeat;}
        </style>

    </head>
    <body>
        <div class="box"></div>
    </body>
</html>
