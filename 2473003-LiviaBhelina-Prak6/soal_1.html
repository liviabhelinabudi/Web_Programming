<html>
<head>
    <title>2473003-Livia Bhelina Budi</title>

    <script>
    function hitung()
    {var a = document.getElementById("angka1").value;
    var b = document.getElementById("angka2").value;
        if(isNaN(a) && isNaN(b)){
            alert("angka pertama dan kedua harus angka.");}
        else if(isNaN(a)){
            alert("angka pertama bukan angka.");}
        else if(isNaN(b)){
            alert("angka kedua harus angka.");}
        else{
            a = parseInt(a);
            b = parseInt(b);
            document.getElementById("t1").innerHTML = a;
            document.getElementById("t2").innerHTML = b;
            document.getElementById("hasil1").innerHTML = a + b;
            document.getElementById("k1").innerHTML = a;
            document.getElementById("k2").innerHTML = b;
            document.getElementById("hasil2").innerHTML = a - b;}
    }
    </script>

</head>
<body>
    Angka Pertama :
    <input type="text" id="angka1"><br><br>
    Angka Kedua :
    <input type="text" id="angka2"><br><br>
    <input type="button" value="Count" onclick="hitung()">

    <table border="1" cellpadding="10">
        <tr>
            <td id="t1"></td>
            <td>+</td>
            <td id="t2"></td>
            <td>=</td>
            <td id="hasil1"></td>
        </tr>
        <tr>
            <td id="k1"></td>
            <td>-</td>
            <td id="k2"></td>
            <td>=</td>
            <td id="hasil2"></td>
        </tr>
    </table>
</body>
</html>
