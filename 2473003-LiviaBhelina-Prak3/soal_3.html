<!DOCTYPE html>
<html>
<head>
    <title>form tambah data user</title>
</head>
    <body>
        <h1 align="center">Form Tambah Data User</h1>
    <form>
            <table align="center">
            <tr>
                <td>Nama</td>
                <td>:</td>
                <td>
                    <input type="text" name="name" required oninvalid="this.setCustomValidity('Name is required!!!')" 
                    oninput="this.setCustomValidity('')">
                </td>
            </tr>
            <tr>
                <td>Address</td>
                <td>:</td>
                <td>
                    <input type="text" name="address" required oninvalid="this.setCustomValidity('Address is required!!!')"
                    oninput="this.setCustomValidity('')">
                </td>
            </tr>

            <tr>
                <td>Email</td>
                <td>:</td>
                <td>
                    <input type="email" name="email" required oninvalid="this.setCustomValidity('Harap isi bidang ini.')"
                    oninput="this.setCustomValidity('')">
                </td>
            </tr>

            <tr>
                <td>Home Page</td>
                <td>:</td>
                <td>
                    <input type="url" name="homepage">
                </td>
            </tr>

            <tr>
                <td>Birthday</td>
                <td>:</td>
                <td>
                    <input type="text" name="birthday" placeholder="hh/bb/tttt">
                </td>
            </tr>

            <tr>
                <td>Favorit Color</td>
                <td>:</td>
                <td>
                    <input type="color" name="color">
                </td>
            </tr>

            <tr>
                <td>IPK</td>
                <td>:</td>
                <td>
                    <input type="number" name="ipk" min="0" max="4" step="0.1" value="0">
                </td>
            </tr>

            <tr>
                <td>Phone Number</td>
                <td>:</td>
                <td>
                    <input type="text" name="phone" pattern="[0-9]{3}-[0-9]{7,10}" placeholder="123-1234567">
                </td>
            </tr>
            <tr>
                <td></td>
                <td></td>
                <td>
            <input type="submit" value="Add">
                </td>
            </tr>
        </table>
    </form>
    </body>
</html>
