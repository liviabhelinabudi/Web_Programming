<html>
<head>
    <title>2473003-Livia Bhelina Budi</title>
    <script src="../jquery-4.0.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $(".header").click(function () {
                var flag = $(this).is(":checked");
                if (flag) {
                    $("input:checkbox.body").prop("checked", true);}
                else {
                    $("input:checkbox.body").prop("checked", false);}
            });
        });
    </script>

</head>
<body>
    <table border="1" cellpadding="0" cellspacing="0">
        <tr>
            <td width="50" align="center">
                <input class="header" type="checkbox"/>
                <br/>
                <hr/>
                <input class="body" type="checkbox"/>
                <br/>
                <input class="body" type="checkbox"/>
                <br/>
                <input class="body" type="checkbox"/>
                <br/>
                <input class="body" type="checkbox"/>
                <br/>
            </td>
        </tr>
    </table>
</body>
</html>
