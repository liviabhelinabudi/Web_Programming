        #menu li {
            list-style: none;}
        #menu>li {
            float: left;
            margin-right: 10px;
            position: relative;}
        #menu>li>a {
            display: block;
            width: 150px;
            background-color: deeppink;
            color: white;
            text-decoration: underline;
            padding-left: 5px;}
        #menu li ol {
            padding-left: 0;
            margin-top: 0;
            border: 2px solid deeppink;
            background-color: white;
            position: absolute;
            width: 150px;}
        #menu li ol li a {
            color: black;}
    </style>

    <script>
        $(document).ready(function () {
            $("li.item ol").hide();
            $("li.item").hover(
                function () {
                    $(this).children("ol").show();
                },
                function () {
                    $(this).children("ol").hide();
                }

            );

        });
    </script>
