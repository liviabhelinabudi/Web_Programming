<html>
<head>
    <title>2473003-Livia Bhelina Budi</title>
    <script src="../jquery-4.0.0.min.js"></script>

    <style>
        #box {
            width: 300px;
            padding: 10px;
            border: 1px solid gray;
            box-shadow: 3px 3px 10px gray;}
        #cari {
            width: 190px;
            margin-bottom: 10px;}
        .nama {
            font-size: 18px;}
    </style>

    <script>
        $(document).ready(function () {
            $("#cari").keyup(function () {
                $(".nama").css("color", "black");
                var cari = $("#cari").val().toLowerCase();
                $(".nama").filter(function () {
                    return $(this).text().toLowerCase().includes(cari);
                }).css("color", "red");
            });
        });
    </script>

</head>
<body>
    <div id="box">
        <input type="text" id="cari">
        <br><br>
        <div class="nama">Sun Microsystem</div>
        <div class="nama">Apache Software Foundation</div>
        <div class="nama">Oracle Coorporation</div>
        <div class="nama">International Business Machines</div>
        <div class="nama">Microsoft Corporation</div>
        <div class="nama">Apple Inc</div>
        <div class="nama">Sap Ag</div>
        <div class="nama">Accenture</div>
        <div class="nama">Computer Sciences Coorporation</div>
        <div class="nama">Google</div>
        <div class="nama">Softbank</div>
        <div class="nama">Yahoo</div>
    </div>
</body>
</html>
