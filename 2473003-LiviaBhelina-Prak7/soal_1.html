<html>
<head>
    <title>2473003-Livia Bhelina Budi</title>

    <style>
        .box {
            display: inline-block;            
            padding: 15px;
            border: 1px solid #999;
            box-shadow: 2px 2px 8px gray;}
        .row {
            margin-bottom: 10px;}
        label {
            display: inline-block;
            width: 70px;}
        .textarea-wrapper {
            position: relative;
            display: inline-block;}
        textarea {
            width: 250px;
            height: 120px;
            resize: none;
            overflow-y: scroll;}
        .counter {
            position: absolute;
            right: 0;
            border: 1px solid gray;
            padding: 1px 6px;
            background: white;}
    </style>
</head>
<body>
    <div class="box">
        <div class="row">
            <label>Judul :</label>
            <input type="text" style="width:250px;">
        </div>

        <div class="row">
            <label>Deskripsi :</label>
            <div class="textarea-wrapper">
                <textarea id="deskripsi"
                    onkeyup="call_onKeyPress(this)"
                    onkeydown="call_onKeyPress(this)"></textarea>
                <div id="counter" class="counter">0/256</div>
            </div>
        </div>
    </div>
    
<script>
    function call_onKeyPress(ob){
        let obval = ob.value;
        if(obval.length > 256){
            obval = obval.substr(0,256);
            ob.value = obval;
        }
        document.getElementById("counter").innerHTML = obval.length + "/256";}
</script>
</body>
</html>
